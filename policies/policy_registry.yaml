tools:
  send_email:
    rules: [pii_detection, denylist]
    pii_exclude_fields: ["recipient"]
    denylist:
      field: "recipient"
      values: ["blocked-domain.com", "spam-domain.org"]

  http_post:
    rules: [pii_detection, argument_bounds, denylist]
    argument_bounds:
      timeout: {type: int, min: 1, max: 300}
      body: {type: str, max_length: 10000}
    denylist:
      field: "url"
      values: ["internal.corp", "localhost"]

  delete_record:
    rules: [argument_bounds]
    stateful_rules: [rate_limit, scope_creep]
    argument_bounds:
      record_id: {type: str, pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"}
    rate_limit:
      max_calls: 3
      window_seconds: 300
    scope_creep:
      protected_field: "record_id"
      protected_tag: "protected_record_ids"

  check_permissions:
    rules: []
    stateful_rules: []
    tag_tools:
      protected_field: "record_id"
      protected_tag: "protected_record_ids"

  file_write:
    rules: [denylist, argument_bounds]
    denylist:
      field: "path"
      values: ["/etc/passwd", "/etc/shadow", "/root/"]
    argument_bounds:
      path: {type: str, pattern: "^[a-zA-Z0-9/_.-]+$"}
